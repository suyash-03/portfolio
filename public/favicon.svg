<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f0f1a"/>
  
  <!-- Glitch layer 1 (cyan offset) -->
  <text x="32" y="44" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" 
        fill="#06b6d4" text-anchor="middle" opacity="0.7"
        transform="translate(-2, -1)">SS</text>
  
  <!-- Glitch layer 2 (pink offset) -->
  <text x="32" y="44" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" 
        fill="#f472b6" text-anchor="middle" opacity="0.7"
        transform="translate(2, 1)">SS</text>
  
  <!-- Main text with gradient -->
  <text x="32" y="44" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" 
        fill="url(#grad1)" text-anchor="middle">SS</text>
  
  <!-- Glitch lines -->
  <rect x="8" y="24" width="48" height="2" fill="#06b6d4" opacity="0.3"/>
  <rect x="12" y="38" width="40" height="1" fill="#f472b6" opacity="0.4"/>
  <rect x="6" y="48" width="52" height="1.5" fill="#6366f1" opacity="0.25"/>
</svg>
